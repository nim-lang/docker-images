name: Maintenance - Nim 2.2.x

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nim-version:
          - 2.2.6
          - 2.2.4
          - 2.2.2
          - 2.2.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Arch
        run: |
          VERSION="${{ matrix.nim-version }}"
          BASE_TAG="nimlang/nim:$VERSION"
          MANIFEST_TAGS=""

          # amd64
          if [ -d "./dockerfiles/$VERSION/amd64" ]; then
            echo "Building amd64..."
            docker buildx build --platform linux/amd64 -t "${BASE_TAG}-amd64" --push "./dockerfiles/$VERSION/amd64"
            MANIFEST_TAGS="${MANIFEST_TAGS} ${BASE_TAG}-amd64"
          fi

          # arm64v8
          if [ -d "./dockerfiles/$VERSION/arm64v8" ]; then
            echo "Building arm64v8..."
            docker buildx build --platform linux/arm64 -t "${BASE_TAG}-arm64v8" --push "./dockerfiles/$VERSION/arm64v8"
            MANIFEST_TAGS="${MANIFEST_TAGS} ${BASE_TAG}-arm64v8"
          fi

          # arm32v7
          if [ -d "./dockerfiles/$VERSION/arm32v7" ]; then
            echo "Building arm32v7..."
            docker buildx build --platform linux/arm/v7 -t "${BASE_TAG}-arm32v7" --push "./dockerfiles/$VERSION/arm32v7"
            MANIFEST_TAGS="${MANIFEST_TAGS} ${BASE_TAG}-arm32v7"
          fi

          if [ -n "$MANIFEST_TAGS" ]; then
            echo "Creating manifest for ${BASE_TAG}..."
            docker manifest create "${BASE_TAG}" $MANIFEST_TAGS
            docker manifest push "${BASE_TAG}"
          fi
